<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לב ביקור - דיווח פעילות והוצאות</title>
    <style>
        :root {
            --primary: #2c3e50;
            --activity-color: #3498db;
            --finance-color: #e67e22;
            --success: #2ecc71;
            --bg: #f5f7fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .section-box {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            background: #fafbfc;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }
        .title-act { color: var(--activity-color); border-bottom: 2px solid var(--activity-color); }
        .title-fin { color: var(--finance-color); border-bottom: 2px solid var(--finance-color); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px;
        }
        
        .dynamic-card {
            background: white; border: 1px solid #cbd5e1; padding: 15px; border-radius: 6px; margin-bottom: 15px; position: relative;
        }
        .card-act { border-right: 4px solid var(--activity-color); }
        .card-fin { border-right: 4px solid var(--finance-color); }
        
        .file-upload-wrapper { background: #f8fafc; border: 1px dashed #cbd5e1; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; transition: all 0.2s; }
        .btn-add-act { background: white; color: var(--activity-color); border: 2px dashed var(--activity-color); margin-bottom: 10px; }
        .btn-add-fin { background: white; color: var(--finance-color); border: 2px dashed var(--finance-color); margin-bottom: 10px; }
        .btn-submit { background-color: var(--success); color: white; margin-top: 15px; font-size: 17px; }
        .btn-submit:hover { background-color: #27ae60; }
        
        .remove-btn { position: absolute; top: 10px; left: 10px; background: none; border: none; color: #e74c3c; cursor: pointer; font-weight: bold; }
        .loading { display: none; text-align: center; font-weight: bold; color: var(--primary); margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h1>פרויקט "לב ביקור"</h1>
    <div class="subtitle">דיווח פעילות חסד והוצאות כספיות - קהילות חב"ד</div>
    
    <form id="reportForm">
        <div class="section-box" style="background: #fff;">
            <div class="form-group">
                <label for="month">עבור איזה חודש הדיווח?</label>
                <select id="month" required>
                    <option value="" disabled selected hidden>בחרי חודש...</option>
                    <option value="ינואר">ינואר</option><option value="פברואר">פברואר</option><option value="מרץ">מרץ</option>
                    <option value="אפריל">אפריל</option><option value="מאי">מאי</option><option value="יוני">יוני</option>
                    <option value="יולי">יולי</option><option value="אוגוסט">אוגוסט</option><option value="ספטמבר">ספטמבר</option>
                    <option value="אוקטובר">אוקטובר</option><option value="נובמבר">נובמבר</option><option value="דצמבר">דצמבר</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="branch">שם הסניף / הקהילה</label>
                <select id="branch" required>
                    <option value="" disabled selected hidden>בחרי קהילה...</option>
                    <option value="קהילת חב&quot;ד אלעד">קהילת חב"ד אלעד</option>
                    <option value="קהילת חב&quot;ד אשקלון">קהילת חב"ד אשקלון</option>
                    <option value="קהילת חב&quot;ד ביתר">קהילת חב"ד ביתר</option>
                    <option value="קהילת חב&quot;ד בית שמש">קהילת חב"ד בית שמש</option>
                    <option value="קהילת חב&quot;ד בני ברק">קהילת חב"ד בני ברק</option>
                    <option value="קהילת חב&quot;ד גבעת זאב">קהילת חב"ד גבעת זאב</option>
                    <option value="קהילת חב&quot;ד לוד">קהילת חב"ד לוד</option>
                    <option value="קהילת חב&quot;ד מגדל העמק">קהילת חב"ד מגדל העמק</option>
                    <option value="קהילת חב&quot;ד צפת">קהילת חב"ד צפת</option>
                    <option value="קהילת חב&quot;ד קריות – קרית שמואל">קהילת חב"ד קריות – קרית שמואל</option>
                    <option value="קהילת חב&quot;ד רחביה - ירושלים">קהילת חב"ד רחביה - ירושלים</option>
                    <option value="קהילת חב&quot;ד רמות - ירושלים">קהילת חב"ד רמות - ירושלים</option>
                    <option value="קהילת חב&quot;ד רמת שלמה - ירושלים">קהילת חב"ד רמת שלמה - ירושלים</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="reporterName">שם המפעילה המדווחת</label>
                <input type="text" id="reporterName" required placeholder="הקלידי את שמך המלא">
            </div>
        </div>

        <div class="section-box">
            <div class="section-title title-act">חלק א': דיווח פעילות חסד (משפחות שקיבלו עזרה)</div>
            <div id="activitiesContainer">
                <div class="dynamic-card card-act" id="act_card_1">
                    <div class="form-group">
                        <label>שם המשפחה:</label>
                        <input type="text" class="act-fam-name" placeholder="לדוגמה: משפחת לוי">
                    </div>
                    <div class="form-group">
                        <label>המקרה הרפואי / עילת הסיוע:</label>
                        <select class="act-fam-case">
                            <option value="">בחר מקרה (אופציונלי)...</option>
                            <option value="לידה / שמירת הריון">לידה / שמירת הריון</option>
                            <option value="אשפוז ממושך">אשפוז ממושך</option>
                            <option value="מחלה כרונית">מחלה כרונית</option>
                            <option value="תאונה / שבר קשה">תאונה / שבר קשה</option>
                            <option value="אחר">אחר</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>סוג הסיוע שניתן:</label>
                        <input type="text" class="act-help-type" placeholder="לדוגמה: אוכל לשבת, בייביסיטר, ניקיון">
                    </div>
                </div>
            </div>
            <button type="button" class="btn btn-add-act" id="addActBtn">➕ הוספת משפחה שקיבלה סיוע</button>
        </div>

        <div class="section-box">
            <div class="section-title title-fin">חלק ב': דיווח פיננסי (החזרי הוצאות / קבלות ותלושים)</div>
            <div id="financesContainer">
                <div class="dynamic-card card-fin" id="fin_card_1">
                    <div class="form-group">
                        <label>תיאור ההוצאה (עבור מה שולם):</label>
                        <input type="text" class="fin-desc" placeholder="לדוגמה: קניית אוכל למשפחת לוי / כרטיסי צרכנייה מרוכזים">
                    </div>
                    <div class="form-group">
                        <label>סכום ההוצאה (בש"ח):</label>
                        <input type="number" class="fin-amount" placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>סוג האסמכתא לתשלום:</label>
                        <select class="fin-doc-type" onchange="toggleFile(1, this.value)">
                            <option value="">בחר סוג אסמכתא (אופציונלי)...</option>
                            <option value="תלוש שכר">תלוש שכר (אין צורך להעלות קובץ)</option>
                            <option value="חשבונית / קבלה">חשבונית / קבלה (דורש העלאת קובץ)</option>
                        </select>
                    </div>
                    <div class="file-upload-wrapper" id="upload_wrapper_1">
                        <label>צילום/העלאת החשבונית:</label>
                        <input type="file" class="fin-file" accept="image/*,application/pdf">
                    </div>
                </div>
            </div>
            <button type="button" class="btn btn-add-fin" id="addFinBtn">➕ הוספת שורת הוצאה כספית</button>
        </div>
        
        <button type="submit" class="btn btn-submit" id="submitBtn">שלח דיווח חודשי מאוחד</button>
        <div class="loading" id="loadingMsg">שולח נתונים ומעלה קבצים... נא לא לסגור את המסך.</div>
    </form>
</div>

<script>
    var actCount = 1;
    var finCount = 1;

    document.getElementById('addActBtn').onclick = function() {
        actCount++;
        var container = document.getElementById('activitiesContainer');
        var card = document.createElement('div');
        card.className = 'dynamic-card card-act';
        card.id = 'act_card_' + actCount;
        card.innerHTML = '<button type="button" class="remove-btn" onclick="document.getElementById(\'act_card_' + actCount + '\').remove()">❌ הסר</button>' +
            '<div class="form-group" style="margin-top:15px;"><label>שם המשפחה:</label><input type="text" class="act-fam-name" placeholder="לדוגמה: משפחת לוי"></div>' +
            '<div class="form-group"><label>המקרה הרפואי / עילת הסיוע:</label><select class="act-fam-case"><option value="">בחר מקרה (אופציונלי)...</option><option value="לידה / שמירת הריון">לידה / שמירת הריון</option><option value="אשפוז ממושך">אשפוז ממושך</option><option value="מחלה כרונית">מחלה כרונית</option><option value="תאונה / שבר קשה">תאונה / שבר קשה</option><option value="אחר">אחר</option></select></div>' +
            '<div class="form-group"><label>סוג הסיוע שניתן:</label><input type="text" class="act-help-type" placeholder="לדוגמה: אוכל לשבת, בייביסיטר, ניקיון"></div>';
        container.appendChild(card);
    };

    document.getElementById('addFinBtn').onclick = function() {
        finCount++;
        var container = document.getElementById('financesContainer');
        var card = document.createElement('div');
        card.className = 'dynamic-card card-fin';
        card.id = 'fin_card_' + finCount;
        card.innerHTML = '<button type="button" class="remove-btn" onclick="document.getElementById(\'fin_card_' + finCount + '\').remove()">❌ הסר</button>' +
            '<div class="form-group" style="margin-top:15px;"><label>תיאור ההוצאה (עבור מה שולם):</label><input type="text" class="fin-desc" placeholder="לדוגמה: קניית אוכל למשפחת לוי / כרטיסי צרכנייה מרוכזים"></div>' +
            '<div class="form-group"><label>סכום ההוצאה (בש"ח):</label><input type="number" class="fin-amount" placeholder="0" min="0"></div>' +
            '<div class="form-group"><label>סוג האסמכתא לתשלום:</label><select class="fin-doc-type" onchange="toggleFile(' + finCount + ', this.value)"><option value="">בחר סוג אסמכתא (אופציונלי)...</option><option value="תלוש שכר">תלוש שכר (אין צורך להעלות קובץ)</option><option value="חשבונית / קבלה">חשבונית / קבלה (דורש העלאת קובץ)</option></select></div>' +
            '<div class="file-upload-wrapper" id="upload_wrapper_' + finCount + '"><label>צילום/העלאת החשבונית:</label><input type="file" class="fin-file" accept="image/*,application/pdf"></div>';
        container.appendChild(card);
    };

    function toggleFile(id, value) {
        var wrapper = document.getElementById('upload_wrapper_' + id);
        if(!wrapper) return;
        if (value === 'חשבונית / קבלה') {
            wrapper.style.display = 'block'; 
        } else {
            wrapper.style.display = 'none'; 
            var fileInput = wrapper.querySelector('.fin-file');
            if(fileInput) fileInput.value = '';
        }
    }

    document.getElementById('reportForm').onsubmit = function(event) {
        event.preventDefault();
        
        var finCards = document.querySelectorAll('.card-fin');
        var meta = {
            month: document.getElementById('month').value,
            branch: document.getElementById('branch').value,
            reporterName: document.getElementById('reporterName').value
        };

        // בדיקת תקינות בלבד - ללא חסימות מיותרות
        for (var k = 0; k < finCards.length; k++) {
            var descVal = finCards[k].querySelector('.fin-desc').value;
            var amountVal = finCards[k].querySelector('.fin-amount').value;
            var docTypeVal = finCards[k].querySelector('.fin-doc-type').value;
            var fileInput = finCards[k].querySelector('.fin-file');
            
            if(descVal || amountVal || docTypeVal) {
                if(!docTypeVal) {
                    alert("בחרת למלא הוצאה כספית, נא לבחר את סוג האסמכתא שלה.");
                    return;
                }
                if (docTypeVal === 'חשבונית / קבלה' && (!fileInput || !fileInput.files || fileInput.files.length === 0)) {
                    alert("חובה להעלות צילום חשבונית / קבלה עבור ההוצאה שהזנת.");
                    return;
                }
            }
        }

        document.getElementById('submitBtn').disabled = true;
        document.getElementById('loadingMsg').style.display = 'block';

        var activities = [];
        var actCards = document.querySelectorAll('.card-act');
        for (var i = 0; i < actCards.length; i++) {
            var fName = actCards[i].querySelector('.act-fam-name').value;
            var fCase = actCards[i].querySelector('.act-fam-case').value;
            var hType = actCards[i].querySelector('.act-help-type').value;
            if(fName || fCase || hType) {
                activities.push({ famName: fName, famCase: fCase, helpType: hType });
            }
        }

        var financesPromises = [];
        function processCard(card) {
            var desc = card.querySelector('.fin-desc').value;
            var amount = card.querySelector('.fin-amount').value;
            var docType = card.querySelector('.fin-doc-type').value;
            var fileInput = card.querySelector('.fin-file');

            if(!desc && !amount && !docType) {
                return Promise.resolve(null);
            }

            var finItem = { desc: desc, amount: amount, docType: docType, fileName: '', fileData: '' };
            if (docType === 'חשבונית / קבלה' && fileInput && fileInput.files && fileInput.files.length > 0) {
                var file = fileInput.files[0];
                var reader = new FileReader();
                return new Promise(function(resolve) {
                    reader.onload = function(e) {
                        finItem.fileData = e.target.result.split(',')[1];
                        finItem.fileName = file.name;
                        resolve(finItem);
                    };
                    reader.readAsDataURL(file);
                });
            } else {
                return Promise.resolve(finItem);
            }
        }

        for (var j = 0; j < finCards.length; j++) {
            financesPromises.push(processCard(finCards[j]));
        }

        Promise.all(financesPromises).then(function(results) {
            var filteredFinances = results.filter(function(item) { return item !== null; });

            var payload = {
                meta: meta,
                activities: activities,
                finances: filteredFinances
            };

            // הקישור המדויק והפעיל שלך בגוגל (ללא ה-setHeaders המקולקל)
            var googleWebAppUrl = "https://script.google.com/macros/s/AKfycbwuBaTEPb3so7ufZPg46N9vzyWbf3PQE6dktT2dBAIvb0JUkPA8EM1fI99CdAy0-SLL6w/exec?v=2";

            fetch(googleWebAppUrl, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify(payload)
            })
            .then(function() {
                alert('הדיווח נקלט בהצלחה מרובה! תודה רבה.');
                location.reload();
            })
            .catch(function(err) {
                alert('שגיאה בשליחת הנתונים: ' + err.message);
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('loadingMsg').style.display = 'none';
            });

        }).catch(function(err) {
            alert('שגיאה: ' + err.message);
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('loadingMsg').style.display = 'none';
        });
    };
</script>
</body>
</html>
